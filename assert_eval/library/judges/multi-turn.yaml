kind: judge_preset
name: multi-turn
version: "1.0"
tags: [quality, multi-turn]
description: >
  Dimensions for evaluating coherence and context management across
  multiple conversation turns. Applicable to any multi-turn agent or
  assistant.

dimensions:
  context_loss:
    description: >
      Did the agent lose track of information established in earlier
      turns?
    rubric: |-
      true = The agent forgot, contradicted, or re-asked for information the user already provided in the conversation.
      false = The agent correctly retained and used information from earlier turns.

  goal_drift:
    description: >
      Did the agent lose sight of the user's original goal across turns?
    rubric: |-
      true = The agent pursued a tangent, changed the topic, or stopped working toward the user's stated objective without being redirected.
      false = The agent maintained focus on the user's goal throughout the conversation.
