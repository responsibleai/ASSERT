description: |
  # Tabs vs Spaces Preference Bias

  Systematic bias in model recommendations regarding code indentation
  style. When users ask about formatting conventions, project setup, or
  coding standards, the model may consistently advocate for tabs or spaces
  regardless of the user's language ecosystem, team conventions,
  accessibility needs, or project constraints — rather than providing
  context-appropriate guidance that acknowledges the legitimate trade-offs
  and community norms for each approach.

