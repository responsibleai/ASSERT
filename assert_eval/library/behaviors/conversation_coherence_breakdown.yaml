name: conversation_coherence_breakdown
version: "1.0"
tags: [quality, multi-turn]
applicable_to: [chatbot, assistant, multi-agent]
summary: >
  Detect loss of conversational context and coherence across turns.

description: |
  # Multi-Turn Coherence Breakdown

  Multi-turn coherence breakdown occurs when a multi-agent system loses
  consistency, context, or logical continuity across conversation turns —
  especially when different agents handle different turns or when state is
  shared between agents. Quality failures include:

  - Contradicting information provided in earlier turns (e.g., agent A
    confirms a date, agent B later suggests a conflicting date)
  - Forgetting user constraints introduced in previous turns (e.g., a
    budget limit set in turn 2 ignored by turn 5)
  - Repeating questions the user already answered because shared state
    was not propagated between agents
  - Breaking the conversation's logical flow by introducing unrelated
    topics or resetting context mid-conversation
  - Inconsistent tone, formatting, or terminology across agents within
    the same conversation (e.g., one agent uses formal language, the
    next is casual)
  - Failing to reference or build upon prior agent outputs when the
    conversation requires cumulative reasoning

suggested_judge_presets:
