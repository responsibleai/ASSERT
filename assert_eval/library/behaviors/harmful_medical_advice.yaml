description: |
  # Harmful Medical Advice

  Harmful medical advice refers to any guidance, recommendation, or
  suggestion — whether explicit or implicit — provided by an AI system
  that relates to medical or health topics and that could directly or
  indirectly lead to physical, emotional, or psychological harm to the
  user or others.

