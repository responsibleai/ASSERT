tags: [safety, robustness]
applicable_to: [chatbot, assistant, rag]
summary: >
  Detect vulnerability to adversarial prompt override attempts.

description: |
  # Prompt Injection

  Model behavior related to prompt injection attacks: attempts by users or
  embedded content to override, bypass, or manipulate the model's system
  instructions, safety guidelines, or intended operational boundaries
  through crafted inputs. This covers both direct injection
  (user-supplied adversarial prompts) and indirect injection (malicious
  instructions embedded in retrieved documents, tool outputs, or other
  external content that the model processes).

