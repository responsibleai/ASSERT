# ASSERT PR Regression Test
#
# Runs on every PR that touches pipeline code or prompts.
# 1. Tier 1: unit tests (<30s)
# 2. Tier 4: regression test with frozen risk specs + paired t-test gate
#
# Seed count can be overridden via PR labels:
#   test_set:20   — quick iteration (~12 min)
#   test_set:50   — default (~30 min)
#   test_set:100  — pre-release (~60 min)

name: Regression Test

on:
  pull_request:
    paths:
      - 'assert_eval/**'
      - 'prompts/**'
      - 'scripts/regression_*.py'
      - 'tests/regression/**'
      # Joint AgentShield + ASSERT demo: gate doc + example changes that
      # claim measured eval-fix-loop numbers (see PR #43 / case study).
      - 'examples/incident_triage_agent/**'
      - 'docs/case-study-*.md'

concurrency:
  group: regression-${{ github.head_ref }}
  cancel-in-progress: true

env:
  AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
  AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
  AZURE_API_VERSION: "2024-12-01-preview"
  ASSERT_AZURE_DEPLOYMENT: "gpt-5.4-mini"

jobs:
  tier1-unit:
    name: "Tier 1: Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install Python dependencies
        # The `otel` extra is required because tests/test_incident_triage_smoke.py
        # imports examples/incident_triage_agent/agent.py, which imports
        # opentelemetry at module load time (target.trace.backend: otel). Demo
        # examples like that one ship as part of the unit-test surface, so the
        # CI install set has to include the demo's optional extras even though
        # core ASSERT doesn't need them.
        run: |
          pip install uv
          uv pip install --system -e ".[dev,otel]"

      - name: Install viewer npm dependencies
        # tests/test_viewer_*.py shell out to `node` against viewer TypeScript
        # sources that import npm packages (e.g. `yaml` in artifacts.ts).
        # Without `viewer/node_modules` populated the viewer harness fails
        # with ERR_MODULE_NOT_FOUND.
        run: npm ci --prefix viewer

      - name: Run unit tests
        run: pytest tests/ -x -q

  tier4-regression:
    name: "Tier 4: Regression Gate"
    needs: tier1-unit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for merge-base detection

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # `otel` extra matches Tier 1: any test or demo imported during the
        # regression run that pulls in opentelemetry at module load time would
        # otherwise hard-fail at import. Keeping Tier 1 and Tier 4 install
        # sets aligned avoids "passes Tier 1, mysteriously fails Tier 4"
        # surprises in the future.
        run: |
          pip install uv
          uv pip install --system -e ".[dev,otel]"
          uv pip install --system scipy

      - name: Detect seed count from labels
        id: test_set
        run: |
          TEST_SET=50
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          for label in $LABELS; do
            case $label in
              test_set:*) TEST_SET="${label#test_set:}" ;;
            esac
          done
          echo "count=$TEST_SET" >> "$GITHUB_OUTPUT"
          echo "Using $TEST_SET test_set per risk spec"

      - name: Run regression test
        run: |
          python scripts/regression_test.py \
            --baseline "${{ github.event.pull_request.base.sha }}" \
            --treatment "${{ github.sha }}" \
            --test_set "${{ steps.test_set.outputs.count }}" \
            --artifacts-dir artifacts/regression

      - name: Post results to PR summary
        if: always()
        run: |
          REPORT="artifacts/regression/regression_report.json"
          if [ -f "$REPORT" ]; then
            echo "## 🧪 Regression Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            DECISION=$(python -c "import json; r=json.load(open('$REPORT')); print(r['decision']['decision'])")
            ICON="✅"
            if [ "$DECISION" = "BLOCK" ]; then ICON="❌"; fi
            if [ "$DECISION" = "WARN" ]; then ICON="⚠️"; fi

            echo "**Gate Decision: $ICON $DECISION**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Effect | Details |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|--------|---------|" >> "$GITHUB_STEP_SUMMARY"

            python -c "
          import json
          r = json.load(open('$REPORT'))
          for m in r['results']:
              name = m.get('metric_name', '?')
              effect = m.get('effect', '?')
              icon = {'Improved':'✅','Degraded':'❌','Inconclusive':'⚠️','TooFewSamples':'📊','Info':'ℹ️'}.get(effect,'?')
              detail = ''
              if 'p_value' in m and m['p_value'] is not None:
                  detail = f\"p={m['p_value']:.4f} Δ={m.get('mean_diff',0):+.4f}\"
              elif 'baseline_rate' in m:
                  detail = f\"base={m['baseline_rate']:.1%} treat={m['treatment_rate']:.1%}\"
              elif 'baseline_value' in m:
                  detail = f\"base={m['baseline_value']} treat={m['treatment_value']}\"
              print(f'| {name} | {icon} {effect} | {detail} |')
          " >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            python -c "
          import json
          r = json.load(open('$REPORT'))
          for reason in r['decision'].get('reasons', []):
              print(f'- {reason}')
          " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🧪 Regression Test" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ No report generated — pipeline may have failed." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: artifacts/regression/
          retention-days: 14
