# p2m/tau2 Correlation Study
#
# Manual workflow for running individual stages of the correlation study.
# Run one model at a time — tau2 takes ~4 hours per model (4 trials).
#
# Usage examples:
#   - Quick preset:               preset=quick
#   - Run tau2 for one model:     stage=tau2, model=azure/gpt-5.4-mini
#   - Run p2m for one model:      stage=p2m, model=azure/gpt-5.4-mini
#   - Compute correlation:        stage=correlate (model is ignored)

name: "p2m/tau2 Correlation"

on:
  workflow_dispatch:
    inputs:
      preset:
        description: "Preset from models.yaml (overrides stage/model)"
        required: false
        type: choice
        options:
          - ""
          - quick
          - full
      stage:
        description: "Stage to run (ignored when preset is set)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - tau2
          - p2m
          - correlate
      model:
        description: "Model to evaluate (e.g. azure/gpt-5.4-mini)"
        required: false
        default: ""
        type: string
      concurrency:
        description: "Max concurrent tasks (tau2 parallelism)"
        required: false
        default: "10"
        type: string
      trials:
        description: "Number of tau2 trials per task"
        required: false
        default: "4"
        type: string

env:
  AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
  AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
  AZURE_API_BASE_WESTUS2: ${{ secrets.AZURE_API_BASE_WESTUS2 }}
  AZURE_API_BASE_AUSTRALIAEAST: ${{ secrets.AZURE_API_BASE_AUSTRALIAEAST }}
  AZURE_API_VERSION: "2024-12-01-preview"

jobs:
  run:
    name: "${{ inputs.stage }} — ${{ inputs.model }}"
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max (tau2 with 4 trials can take ~4h)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[otel]"
          uv pip install --system scipy
          # tau2-bench from public repo
          uv pip install --system "tau2 @ git+https://github.com/SEACrowd/tau3-bench.git"

      - name: Restore previous results
        uses: actions/cache/restore@v4
        with:
          path: examples/telecom_tau2_correlation/results/
          key: tau2-correlation-results

      - name: "Run: ${{ inputs.preset || inputs.stage }}"
        working-directory: examples/telecom_tau2_correlation
        run: |
          PRESET="${{ inputs.preset }}"
          STAGE="${{ inputs.stage }}"
          MODEL="${{ inputs.model }}"
          CONCURRENCY="${{ inputs.concurrency }}"
          TRIALS="${{ inputs.trials }}"

          ARGS=(--yes --verbose --force)

          if [ -n "$PRESET" ]; then
            ARGS+=(--preset "$PRESET")
          else
            if [ -n "$STAGE" ]; then
              ARGS+=(--stages "$STAGE")
            fi
            if [ -n "$MODEL" ]; then
              ARGS+=(--models "$MODEL")
            fi
          fi

          ARGS+=(--concurrency "$CONCURRENCY")
          ARGS+=(--trials "$TRIALS")

          echo "::group::Command"
          echo "python run_comparison.py ${ARGS[*]}"
          echo "::endgroup::"

          python run_comparison.py "${ARGS[@]}"

      - name: Save results to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: examples/telecom_tau2_correlation/results/
          key: tau2-correlation-results-${{ inputs.stage }}-${{ hashFiles('examples/telecom_tau2_correlation/results/**') }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "correlation-${{ inputs.stage }}-${{ inputs.model && inputs.model || 'all' }}"
          path: |
            examples/telecom_tau2_correlation/results/
            artifacts/results/telecom-tau2-correlation-v1/
          if-no-files-found: ignore

      - name: Post summary
        if: always()
        working-directory: examples/telecom_tau2_correlation
        run: |
          RESULTS="results/correlation_results.json"
          if [ -f "$RESULTS" ]; then
            echo "## τ²↔p2m Correlation Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            python -m json.tool "$RESULTS" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ${{ inputs.stage }} completed" >> "$GITHUB_STEP_SUMMARY"
            echo "Model: ${{ inputs.model }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No correlation results yet (need both tau2 + p2m data)." >> "$GITHUB_STEP_SUMMARY"
          fi
