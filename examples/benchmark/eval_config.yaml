# ═══════════════════════════════════════════════════════════════════════
# Concurrency / throughput benchmark — base config.
# ═══════════════════════════════════════════════════════════════════════
# This config is consumed by `scripts/benchmark.py`, which overrides:
#   - pipeline.policy.behavior_count
#   - pipeline.seeds.scenario.sample_size  (scenario-only by design)
#   - pipeline.rollout.concurrency         (judge re-uses this number)
#   - run                                  (per-invocation timestamped id)
#
# The values left below are placeholders so you can also run this file
# directly with `p2m run --config examples/benchmark/eval_config.yaml`
# for a quick sanity check.
#
# Target: same LangGraph travel planner as examples/travel_planner_langgraph/.
# Concept is *quality-only* (see travel_planner_benchmark.md) so the
# auditor generates realistic, non-adversarial user prompts. That keeps
# the benchmark focused on throughput rather than safety, and avoids
# tripping Azure Prompt Shields' jailbreak detection on adversarial
# auditor turns.
# ═══════════════════════════════════════════════════════════════════════

suite: travel-planner-benchmark
run: bench-placeholder

# scripts/benchmark.py copies travel_planner_benchmark.md (a quality-only
# variant) into the per-run working directory next to this YAML so the
# config loader's `<config>/<concept_name>.md` lookup resolves cleanly.
concept:
  name: travel_planner_benchmark

context: |
  The target is a multi-agent LangGraph travel planner with tool servers:
  search_flights, search_hotels, check_weather, check_travel_advisories,
  and validate_budget. Evaluate quality only: correct tool selection
  and use, faithful grounding in tool output, compliance with explicit
  user constraints (budget, dates, duration, currency), and internal
  consistency of the itinerary. Adversarial / safety probing is out of
  scope for this benchmark.

factors:
  - name: traveler_type
    description: |
      The type of traveler using the travel planner.
  - name: trip_type
    description: |
      The kind of trip being planned.

default_model:
  name: azure/gpt-5.4-mini

pipeline:
  policy:
    model: { name: azure/gpt-5.4-mini, temperature: 0.7, max_tokens: 10000 }
    behavior_count: 6                 # overridden by scripts/benchmark.py

  design:
    model: { name: azure/gpt-5.4-mini, temperature: 0.7 }

  # Scenario-only seeds: prompt seeds intentionally omitted. Multi-turn
  # scenarios are the heavier shape and the one rollout concurrency
  # actually gates on.
  seeds:
    scenario:
      model: { name: azure/gpt-5.4-mini, temperature: 0.2 }
      sample_size: 10                 # overridden by scripts/benchmark.py

  rollout:
    concurrency: 10                   # overridden by scripts/benchmark.py
    target:
      callable: examples.travel_planner_langgraph.agent:chat_sync
      # Using `agent:chat_sync` (not `auto_trace:chat_sync`) so this
      # benchmark doesn't unconditionally register Phoenix as the global
      # OpenTelemetry tracer provider. Tracing isn't needed for
      # throughput measurement and the auto-instrument retries flood the
      # log when no Phoenix collector is running.
    auditor:
      model: { name: azure/gpt-5.4-mini, temperature: 0.0, max_tokens: 10000 }
    max_turns: 6

  judge:
    dimensions:
      policy_violation:
        description: Did the assistant exhibit a quality failure as defined in the policy?
        rubric: |
          true = The assistant called the wrong tool, skipped a required tool, fabricated details (flight numbers, hotel names, prices) not grounded in tool output, violated an explicit user constraint (budget, dates, duration, currency), produced an internally inconsistent itinerary, or dropped a constraint the tools clearly returned
          false = The assistant used the right tools, grounded all concrete details in tool output, respected explicit user constraints, and produced an internally consistent itinerary
      overrefusal:
        description: Did the assistant refuse a reasonable request?
        rubric: |
          true = The assistant refused a legitimate travel planning request
          false = The assistant did not overrefuse
    model: { name: azure/gpt-5.4-mini, temperature: 0.0, max_tokens: 12000 }
