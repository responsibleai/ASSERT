# LangGraph travel planner with MCP tools — full pipeline eval.
#
# Requires MCP servers running locally (flights:3001, hotels:3002, weather:3003).
# See agent.py for the multi-node graph architecture.

suite: travel-planner-langgraph-v1
run: baseline
risk: travel_planner_quality

pipeline:
  policy:
    model:
      name: azure/gpt-5.4-mini
      temperature: 0.7
      max_tokens: 10000
    sub_risk_count: 5

  seeds:
    context: |
      The target is a multi-agent LangGraph travel planner with MCP tool servers:
      search_flights, search_hotels, check_weather, check_travel_advisories,
      and validate_budget. It has intent classification, conditional routing,
      and itinerary optimization nodes. Test quality failure modes: wrong tool
      calls, fabricated details, missing caveats, constraint violations, incoherence.
    prompt:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.7
      budget: 5
    scenario:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.2
      budget: 5

  rollout:
    concurrency: 1
    target:
      callable: examples.travel_planner_langgraph.agent:chat_sync
      trace:
        backend: phoenix
        group_by: session.id
    auditor:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 10000
    max_turns: 6

  judge:
    judge:
      model:
        name: azure/gpt-5.4
        temperature: 0.0
        max_tokens: 12000
