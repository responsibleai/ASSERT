# NeurOSan: Custom-instrumented travel planner (manual OTel spans)
#
# This demonstrates that frameworks WITHOUT Phoenix auto-instrumentors
# can still produce OTel traces that p2m evaluates via the same pipeline.

suite: travel-planner-neurosan-v1
run: custom-otel
risk: travel_planner_quality

pipeline:
  policy:
    model:
      name: azure/gpt-5.4-mini
      temperature: 0.7
      max_tokens: 10000
    sub_risk_count: 5

  seeds:
    context: |
      The target is a custom multi-agent travel planner with 5 specialized agents:
      intent_classifier, flight_searcher, hotel_searcher, safety_advisor, and
      itinerary_optimizer. Each agent uses tools (search_flights, search_hotels,
      check_weather, check_travel_advisories, validate_budget). Test quality
      failure modes: wrong routing, fabricated details, missing caveats, budget
      violations, incoherence across agents.
    prompt:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.7
      budget: 3
    scenario:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.2
      budget: 1

  rollout:
    concurrency: 1
    target:
      callable: examples.travel_planner_neurosan.agent:chat
    auditor:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 10000
    max_turns: 6

  judge:
    judge:
      model:
        name: azure/gpt-5.4
        temperature: 0.0
        max_tokens: 12000
