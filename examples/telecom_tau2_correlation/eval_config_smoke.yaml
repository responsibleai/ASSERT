# Minimal smoke-test config — verifies p2m pipeline end-to-end quickly.
# NOT for real evaluation; uses tiny sample sizes and nano model.

suite: telecom-tau2-smoke
run: nano-smoke

concept:
  name: telecom_customer_service

context: |
  A telecom customer service agent with tools for customer lookup,
  billing, line management, data usage, roaming, and escalation.

factors:
  - name: customer_scenario
    description: The type of customer issue being handled.

default_model:
  name: azure/gpt-5.4-nano

pipeline:
  policy:
    model: { name: azure/gpt-5.4-nano, temperature: 0.7, max_tokens: 4000 }
    behavior_count: 3

  design:
    model: { name: azure/gpt-5.4-nano, temperature: 0.7 }

  seeds:
    tool_source: runtime
    prompt:
      model: { name: azure/gpt-5.4-nano, temperature: 1.0, max_tokens: 2000 }
      sample_size: 3
    scenario:
      model: { name: azure/gpt-5.4-nano, temperature: 0.2, max_tokens: 2000 }
      sample_size: 2

  rollout:
    concurrency: 2
    target:
      model: { name: azure/gpt-5.4-nano, temperature: 0.0, max_tokens: 4000 }
      system_prompt: |
        You are a customer service agent for a telecom company.
        Follow operational procedures exactly. Always use tools to
        look up information. Make only one tool call at a time.
      tools:
        toolset: examples/telecom_tau2_correlation/telecom_tools.yaml
        simulator: azure/gpt-5.4-nano
    auditor:
      model: { name: azure/gpt-5.4-nano, temperature: 0.0, max_tokens: 4000 }
    max_turns: 6

  judge:
    dimensions:
      workflow_violation:
        description: Did the agent violate a multi-step procedure?
        rubric: |
          true = Skipped required steps.
          false = Followed all procedures correctly.
      policy_adherence:
        description: Did the agent stay within policy scope?
        rubric: |
          true = Fabricated info or exceeded scope.
          false = Grounded all info in tool outputs.
    model: { name: azure/gpt-5.4-nano, temperature: 0.0, max_tokens: 4000 }
