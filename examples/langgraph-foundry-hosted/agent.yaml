# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: langgraph-chat-responses
description: |
    Multi-turn LangGraph chat agent with local tools, hosted by Foundry over
    the Responses protocol.
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - LangGraph
        - LangChain
        - Tool Calling
        - Python
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.25"
    memory: 0.5Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
