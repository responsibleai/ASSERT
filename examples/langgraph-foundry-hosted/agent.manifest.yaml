# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: langgraph-chat-responses
displayName: "LangGraph Chat (Responses)"
description: >
  Multi-node travel planner agent built with LangGraph and hosted on Foundry
  over the Responses protocol using langchain_azure_ai.agents.hosting.
  Includes five simulated travel tools: search_flights, search_hotels,
  check_weather, check_travel_advisories, and validate_budget. Server-side
  conversation state via previous_response_id.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - LangGraph
    - LangChain
    - Tool Calling
    - Python
template:
  name: langgraph-chat-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT is injected by the platform (hosted) and
    # translated by azd (local) — do NOT declare it here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
