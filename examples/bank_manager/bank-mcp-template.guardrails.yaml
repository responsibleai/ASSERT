metadata:
  name: "bank-mcp-template"
  version: "1.0.0"
  description: "MCP developer template for banking tools with safe state transitions"
  agent_shield_version: "1.0"

extends:
  - "bank-base.guardrails.yaml"

# ─────────────────────────────────────────────────────────────────────
# Variables — declared once with their full lifecycle (push, pull, reset)
# at the variable definition. No bridge policies needed; v1.0 supports
# kind: tool / endpoint / agent uniformly in populated_by[].
# ─────────────────────────────────────────────────────────────────────
variables:
  # Transfer-prep state, pushed from prepare_transfer's result.
  - name: "transfer_amount"
    type: number
    populated_by:
      - kind: tool
        name: "prepare_transfer"
        expression: "@result.transfer_amount"

  - name: "transfer_approved"
    type: boolean
    populated_by:
      - kind: tool
        name: "prepare_transfer"
        expression: "@result.transfer_approved"
      - kind: tool
        name: "request_customer_approval"
        expression: "@result.transfer_approved"

  - name: "customer_ack_token"
    type: string
    populated_by:
      - kind: tool
        name: "request_customer_approval"
        expression: "@result.customer_ack_token"

  - name: "admin_mode_active"
    type: boolean
    populated_by:
      - kind: tool
        name: "enable_admin_mode"
        expression: "@result.admin_mode_active"

  - name: "violation_count"
    type: number
    default: 0

  # Endpoint and agent results bind directly via populated_by.
  - name: "credit_score"
    type: number
    populated_by:
      - kind: endpoint
        pattern: "/api/v1/credit-check/{customer_id}"
        methods: ["GET"]
        expression: "@result.credit_score"

  - name: "fraud_risk_score"
    type: number
    populated_by:
      - kind: agent
        name: "fraud_detection_agent"
        expression: "@result.fraud_risk_score"

  # ── Authorization variables (resolver-driven). A "no" sticks for the
  #    session; a "yes" applies once unless overridden. ──
  - name: "transfer_execution_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve execution of prepared transfer."
    lifetime: per_call

  - name: "freeze_account_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve account freeze."
    lifetime: per_call

  - name: "admin_mode_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve enabling admin mode (5 minute window)."
    lifetime: per_session

  - name: "high_value_transfer_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve high-value transfer (> $10,000)."
    lifetime: per_call

  - name: "fraud_review_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve transfer despite high fraud risk score."
    lifetime: per_call

  - name: "payments_endpoint_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve payment via /api/v1/payments."
    lifetime: per_call

predicates:
  in_restricted_mode: "violation_count >= 3"

state_validation:
  guard_policies:
    # ── Tool gates ──
    - name: "create_transfer_gate"
      applies_to:
        tools: ["create_transfer"]
      evaluate_when:
        - expression: "transfer_approved == true"
          reason: "Transfer must be approved before execution."
        - expression: "not is_null(customer_ack_token)"
          reason: "Valid customer acknowledgement token required."
        - expression: "transfer_execution_authorized == true"
          reason: "Transfer execution requires manager approval."
        - expression: "transfer_amount <= 10000 or high_value_transfer_authorized == true"
          reason: "High-value transfer (> $10,000) requires additional approval."

    - name: "freeze_account_gate"
      applies_to:
        tools: ["freeze_account"]
      evaluate_when:
        - expression: "admin_mode_active == true"
          reason: "Admin mode required for account freeze operations."
        - expression: "freeze_account_authorized == true"
          reason: "Account freeze requires manager approval."

    - name: "enable_admin_mode_gate"
      applies_to:
        tools: ["enable_admin_mode"]
      evaluate_when:
        - expression: "admin_mode_authorized == true"
          reason: "Enabling admin mode requires manager approval."

    # ── Endpoint gates ──
    - name: "payments_endpoint_gate"
      applies_to:
        endpoints:
          - pattern: "/api/v1/payments/{payment_id}"
            methods: ["POST"]
      evaluate_when:
        - expression: "transfer_amount <= 50000"
          reason: "Payments over $50,000 are blocked."
        - expression: "payments_endpoint_authorized == true"
          reason: "Payments API requires manager approval."

    - name: "external_api_block"
      description: "External third-party APIs are forbidden."
      applies_to:
        endpoints:
          - pattern: "/api/v1/external/**"
            methods: ["*"]
      reason: "External API access is forbidden."
      log:
        severity: high
        category: external_access

    # ── Agent gate — fraud agent's own response gates further action ──
    - name: "fraud_detection_agent_gate"
      applies_to:
        agents: ["fraud_detection_agent"]
      evaluate_when:
        - expression: "fraud_risk_score < 80 or is_null(fraud_risk_score) or fraud_review_authorized == true"
          reason: "High fraud risk detected — manual review required."

    # ── Restricted lockdown after repeated violations ──
    - name: "restricted_mode_lockdown"
      description: "After 3+ violations, lock down sensitive resources for the session."
      applies_to:
        tools:
          - "prepare_transfer"
          - "create_transfer"
          - "freeze_account"
          - "enable_admin_mode"
        endpoints:
          - pattern: "/api/v1/external/**"
            methods: ["*"]
      active_if: "in_restricted_mode"
      reason: "Restricted mode active — repeated security violations detected."
      log:
        severity: critical
        category: restricted_mode

# ─────────────────────────────────────────────────────────────────────
# Resources — identity only. All gating and lifecycle live above.
# ─────────────────────────────────────────────────────────────────────
resources:
  tools:
    - name: "read_account"
      description: "Read account information for the authenticated customer"
      permission: "read_only"
    - name: "read_transaction_history"
      description: "Read transaction history"
      permission: "read_only"
    - name: "prepare_transfer"
      description: "Prepare a transfer for review (sets transfer context)"
      permission: "read_write"
    - name: "request_customer_approval"
      description: "Request customer approval for pending transfer"
      permission: "execute"
    - name: "create_transfer"
      description: "Execute approved transfer with capability token"
      permission: "execute"
    - name: "freeze_account"
      description: "Freeze account (admin operation)"
      permission: "destructive"
    - name: "enable_admin_mode"
      description: "Enable admin mode (time-limited)"
      permission: "execute"

  endpoints:
    - pattern: "/api/v1/payments/{payment_id}"
      methods: ["POST"]
    - pattern: "/api/v1/credit-check/{customer_id}"
      methods: ["GET"]

  agents:
    - name: "fraud_detection_agent"
      description: "Sub-agent for real-time fraud analysis"
