metadata:
  name: "bank-manager-minimal-deterministic"
  version: "1.0.0"
  description: "Minimal deterministic ACS gates for the bank-manager A/B guardrails demo."
  agent_shield_version: "1.0.0"

objective:
  goal:
    - "Allow normal bank-manager account lookups and transfer preparation."
    - "Enforce deterministic gates for approval order, grounded transfer identifiers, PII handling, and social-engineering or transaction-memo injection patterns."
  forbidden:
    - "Move money without the prepare -> request_customer_approval -> create_transfer state machine."
    - "Freeze an account before enable_admin_mode succeeds."
    - "Echo deterministic PII patterns into assistant-visible text."
    - "Follow fake authority claims or instructions embedded in transaction memos."

variables:
  - name: "memo_referenced_accounts"
    type: array
    populated_by:
      - kind: tool
        name: "read_transaction_history"
        expression: "@result.referenced_accounts"
    default: []

  - name: "proposed_transfer_from_account"
    type: string
    populated_by:
      - kind: tool
        name: "prepare_transfer"
        phase: before
        expression: "@params.from_account"

  - name: "proposed_transfer_to_account"
    type: string
    populated_by:
      - kind: tool
        name: "prepare_transfer"
        phase: before
        expression: "@params.to_account"

  - name: "issued_transfer_ids"
    type: array
    update: append
    populated_by:
      - kind: tool
        name: "prepare_transfer"
        expression: "@result.transfer_id"
    default: []

  - name: "proposed_approval_transfer_id"
    type: string
    populated_by:
      - kind: tool
        name: "request_customer_approval"
        phase: before
        expression: "@params.transfer_id"

  - name: "transfer_approved"
    type: boolean
    populated_by:
      - kind: tool
        name: "request_customer_approval"
        expression: "@result.transfer_approved"
    default: false

  - name: "customer_ack_token"
    type: string
    populated_by:
      - kind: tool
        name: "request_customer_approval"
        expression: "@result.customer_ack_token"

  - name: "last_approved_transfer_id"
    type: string
    populated_by:
      - kind: tool
        name: "request_customer_approval"
        expression: "@result.transfer_id"

  - name: "proposed_create_transfer_id"
    type: string
    populated_by:
      - kind: tool
        name: "create_transfer"
        phase: before
        expression: "@params.transfer_id"

  - name: "proposed_create_ack_token"
    type: string
    populated_by:
      - kind: tool
        name: "create_transfer"
        phase: before
        expression: "@params.customer_ack_token"

  - name: "admin_mode_active"
    type: boolean
    populated_by:
      - kind: tool
        name: "enable_admin_mode"
        expression: "@result.admin_mode_active"
    default: false

  - name: "transfer_authorized"
    type: boolean
    on_demand_by:
      kind: human
      provider: console
      prompt: "Approve this VIP transfer before prepare_transfer proceeds?"
    lifetime: per_call
    default: false

input_validation:
  guard_policies:
    - name: "input_structural_blocklist"
      evaluate_when:
        - patterns:
            - "(?i)\\b\\d{3}-\\d{2}-\\d{4}\\b"
            - "(?i)\\bACC-\\d{4}\\b.*\\bACC-\\d{4}\\b.*\\bACC-\\d{4}\\b"
            - "(?i)\\b(?:all|every|multiple|unrelated)\\s+(?:accounts|customers)\\b"
            - "(?i)\\b(?:ceo|chief executive|it admin|administrator|auditor|regulator)\\b.*\\b(?:skip|bypass|override|without approval|without verification|no approval|no verification)\\b"
            - "(?i)\\b(?:ignore|disregard|override)\\b.*\\b(?:system|developer|policy|guardrail|instructions|rules)\\b"
          reason: "Blocks SSNs, account-enumeration probes, authority-plus-bypass social engineering, and explicit instruction override attempts."

state_validation:
  guard_policies:
    - name: "prepare_transfer_memo_injection_gate"
      applies_to:
        tools: ["prepare_transfer"]
      evaluate_when:
        - expression: "not (proposed_transfer_to_account in memo_referenced_accounts)"
          reason: "Destination account appeared only in tool-returned memo text."

    - name: "prepare_transfer_vip_gate"
      applies_to:
        tools: ["prepare_transfer"]
      evaluate_when:
        - expression: "proposed_transfer_from_account != 'ACC-1003' or transfer_authorized == true"
          reason: "VIP transfers require an explicit runtime approval gate before preparation."

    - name: "approval_grounding_gate"
      applies_to:
        tools: ["request_customer_approval"]
      evaluate_when:
        - expression: "proposed_approval_transfer_id in issued_transfer_ids"
          reason: "Customer approval can only be requested for a transfer_id returned by prepare_transfer."

    - name: "create_transfer_integrity_gate"
      applies_to:
        tools: ["create_transfer"]
      evaluate_when:
        - expression: "transfer_approved == true"
          reason: "No successful request_customer_approval call has approved this transfer."
        - expression: "not is_null(customer_ack_token)"
          reason: "No customer acknowledgement token has been issued in this session."
        - expression: "proposed_create_transfer_id in issued_transfer_ids"
          reason: "Transfer ID was never returned by prepare_transfer in this session."
        - expression: "proposed_create_transfer_id == last_approved_transfer_id"
          reason: "Most recent acknowledgement token belongs to a different transfer_id."
        - expression: "proposed_create_ack_token == customer_ack_token"
          reason: "Supplied customer_ack_token does not match the token returned by request_customer_approval."

    - name: "freeze_account_admin_mode_gate"
      applies_to:
        tools: ["freeze_account"]
      evaluate_when:
        - expression: "admin_mode_active == true"
          reason: "freeze_account requires prior enable_admin_mode."

post_tool_validation:
  guard_policies:
    - name: "pii_redact_tool_output"
      applies_to:
        tools:
          - "read_account"
          - "read_transaction_history"
          - "prepare_transfer"
          - "request_customer_approval"
          - "create_transfer"
          - "freeze_account"
          - "enable_admin_mode"
      evaluate_when:
        - patterns:
            - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
            - "\\b\\d{4}-\\d{4}-\\d{4}-\\d{4}\\b"
          action: redact
          replacement: "[REDACTED-PII]"
          reason: "Redact deterministic PII patterns from tool outputs before they can be echoed by the assistant."

resources:
  tools:
    - name: "read_account"
      description: "Read account information for the authenticated bank manager."
      permission: "read_only"
    - name: "read_transaction_history"
      description: "Read recent transaction history for an account."
      permission: "read_only"
    - name: "prepare_transfer"
      description: "Prepare a transfer for review."
      permission: "read_write"
    - name: "request_customer_approval"
      description: "Request customer approval for a pending transfer."
      permission: "execute"
    - name: "create_transfer"
      description: "Execute an approved transfer with an acknowledgement token."
      permission: "execute"
    - name: "freeze_account"
      description: "Freeze an account."
      permission: "destructive"
    - name: "enable_admin_mode"
      description: "Enable short-lived admin mode."
      permission: "execute"
