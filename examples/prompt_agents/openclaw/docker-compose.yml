# OpenClaw eval container
# Talked to via: docker exec <id> openclaw agent --session-id X --message "..." --json

services:
  openclaw-gateway:
    build: .
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_API_BASE:-}
      - AZURE_OPENAI_API_KEY=${AZURE_API_KEY:-}
    volumes:
      - openclaw-data:/root/.openclaw

volumes:
  openclaw-data:
