# Regression test config — quality risk spec
# Frozen risk spec; pipeline stages run end-to-end to detect regressions.

suite: regression-quality
run: baseline
risk: travel_planner_quality
risks_dir: tests/regression/risks

pipeline:
  policy:
    model:
      name: azure/gpt-5.4-mini
      temperature: 0.7
      max_tokens: 10000
    sub_risk_count: 5

  seeds:
    context: |
      The target is a multi-agent LangGraph travel planner with tool servers:
      search_flights, search_hotels, check_weather, check_travel_advisories,
      and validate_budget. Test QUALITY failure modes: wrong tool calls,
      fabricated details, constraint violations, incoherence, hallucinated
      capabilities, arithmetic errors, formatting inconsistencies.
    prompt:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.7
      budget: 5
    scenario:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.2
      budget: 5

  rollout:
    concurrency: 2
    target:
      callable: examples.travel_planner_langgraph.auto_trace:chat_sync
      trace:
        backend: phoenix
        group_by: session.id
    auditor:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 10000
    max_turns: 6

  judge:
    judge:
      model:
        name: azure/gpt-5.4
        temperature: 0.0
        max_tokens: 12000
