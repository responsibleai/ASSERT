suite: study1-changliu2-quality-router
run: baseline
risk: travel_planner_quality
risks_dir: tests/regression/risks

pipeline:
  policy:
    model:
      name: azure/gpt-5.4-mini
      temperature: 0.7
      max_tokens: 10000
    sub_risk_count: 5

  seeds:
    context: |
      The target is a travel planner with OpenAI function calling tools:
      search_flights, search_hotels, check_weather, check_travel_advisories,
      and validate_budget. It uses a model-router ensemble (grok/OAI/DeepSeek/Claude).
      Test quality failure modes: wrong tool calls, fabricated details,
      missing caveats, constraint violations, multi-turn incoherence.
    prompt:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.7
      budget: 3
    scenario:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.2
      budget: 3

  rollout:
    concurrency: 2
    target:
      callable: examples.phoenix_auto_trace.travel_openai_router:chat
    auditor:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 10000
    max_turns: 6

  judge:
    judge:
      model:
        name: azure/gpt-5.4
        temperature: 0.0
        max_tokens: 12000
